name: Verify Plant Diversity production after master publication

on:
  push:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: plant-diversity-production-health
  cancel-in-progress: true

jobs:
  semantic_health:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Wait for Connect Cloud and verify semantic markers
        env:
          SMOKE_MAX_ATTEMPTS: "7"
          SMOKE_SLEEP_BASE: "12"
          SMOKE_BROWSER: "1"
          SMOKE_SITE: "SRER"
          SMOKE_BROWSER_TIMEOUT: "120"
          SMOKE_TOTAL_DEADLINE: "780"
          SMOKE_REQUIRE_RECEIPTS: "1"
        run: |
          export SMOKE_APP_RECEIPT="$(tr -d '\r\n' < www/runtime-receipt.txt)"
          export SMOKE_COVER_RECEIPT="$(tr -d '\r\n' < docs/cover-receipt.txt)"
          sleep 45
          bash scripts/post_deploy_smoke.sh \
            "Connect Cloud app=https://019ee109-30ae-006e-cb3b-143afeac57e3.share.connect.posit.cloud/" \
            "GitHub Pages landing=https://tgilbert14.github.io/NEON-Plant-Diversity/"

      - name: Open or update the production outage issue
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          title="Production health: Plant Diversity semantic smoke failed"
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          number=$(gh issue list --state open --search "$title in:title" --json number --jq '.[0].number')
          body="Master publication ${GITHUB_SHA} did not pass semantic production health after the cold-start budget. Run: ${run_url}"
          if [ -n "$number" ]; then
            gh issue comment "$number" --body "$body"
          else
            gh issue create --title "$title" --body "$body"
          fi

      - name: Close a resolved production outage issue
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          title="Production health: Plant Diversity semantic smoke failed"
          number=$(gh issue list --state open --search "$title in:title" --json number --jq '.[0].number')
          if [ -n "$number" ]; then
            run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            gh issue close "$number" --comment "Semantic production health recovered at ${GITHUB_SHA}. Evidence: ${run_url}"
          fi
