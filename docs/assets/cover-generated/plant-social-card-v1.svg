<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">NEON Plant Diversity Explorer social card</title>
  <desc id="desc">Cut-paper dryland vegetation and nested survey quadrats beside the title Composition across scale.</desc>
  <defs>
    <linearGradient id="wash" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f4efe2" stop-opacity="1"/>
      <stop offset="0.44" stop-color="#f4efe2" stop-opacity="0.97"/>
      <stop offset="0.66" stop-color="#f4efe2" stop-opacity="0.58"/>
      <stop offset="0.86" stop-color="#f4efe2" stop-opacity="0"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-30%" width="140%" height="170%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#18372e" flood-opacity="0.18"/>
    </filter>
  </defs>
  <image href="../plant-nested-quadrat-hero-v1-source.png" width="1260" height="630" x="0" y="0" preserveAspectRatio="xMidYMid slice"/>
  <rect width="1200" height="630" fill="url(#wash)"/>

  <g transform="translate(70 48)">
    <rect width="46" height="46" rx="23" fill="#18372e"/>
    <path d="M23 9 L34 23 L23 37 L12 23 Z" fill="none" stroke="#f4efe2" stroke-width="3"/>
    <circle cx="23" cy="23" r="3.5" fill="#c59d54"/>
    <text x="60" y="20" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="18" font-weight="800" fill="#18372e">NEON EXPLORER SUITE</text>
    <text x="60" y="40" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="14" font-weight="650" letter-spacing="1.3" fill="#55785c">DESERT DATA LABS · UNOFFICIAL</text>
  </g>

  <g transform="translate(70 132)" filter="url(#softShadow)">
    <rect width="326" height="38" rx="19" fill="#18372e"/>
    <circle cx="20" cy="19" r="5" fill="#cbdc8e"/>
    <text x="36" y="24.5" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="13" font-weight="850" letter-spacing="1.25" fill="#ffffff">COMPOSITION &amp; INVASION CONTEXT</text>
  </g>

  <text x="70" y="246" font-family="Georgia,Cambria,'Times New Roman',serif" font-size="72" font-weight="700" letter-spacing="-2.3" fill="#1d2b27">
    <tspan x="70" dy="0">NEON Plant</tspan>
    <tspan x="70" dy="76">Diversity</tspan>
  </text>
  <text x="72" y="424" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="28" font-weight="750" fill="#285044">Composition across scale.</text>
  <text x="72" y="462" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="23" font-weight="560" fill="#45544e">Introduced cover in context.</text>

  <g transform="translate(70 526)">
    <rect width="454" height="62" rx="16" fill="#fffdf7" fill-opacity="0.92" stroke="#55785c" stroke-opacity="0.35"/>
    <text x="20" y="25" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="14" font-weight="850" fill="#18372e">46 SITES</text>
    <text x="137" y="25" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="14" font-weight="850" fill="#18372e">1 → 400 m²</text>
    <text x="273" y="25" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="14" font-weight="850" fill="#18372e">5,777 TAXA</text>
    <text x="20" y="47" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="13" font-weight="560" fill="#45544e">Plant Presence &amp; Percent Cover · DP1.10058.001</text>
  </g>
</svg>
